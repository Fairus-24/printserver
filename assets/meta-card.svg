    <text x="110" y="38" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">
      SENT
    </text>

    <rect x="246" y="0" width="220" height="58" rx="16" fill="#3b82f6" />
    <text x="356" y="38" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">
      QUEUE
    </text>

    <rect x="492" y="0" width="220" height="58" rx="16" fill="#f59e0b" />
    <text x="602" y="38" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">
      PRINT
    </text>

    <rect x="738" y="0" width="220" height="58" rx="16" fill="#10b981" />
    <text x="848" y="38" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">
